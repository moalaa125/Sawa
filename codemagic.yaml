workflows:
  flutter-ios-build:
    name: Sawa iOS Build
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Flutter pub get
        script: flutter packages pub get
      - name: Patch Xcode Project (Version & Signing Bypass)
        script: |
          python3 -c "
          with open('ios/Runner.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()
          # تعديل الإصدار وقفل التوقيع الرقمي بدقة داخل ملف المشروع لمنع تعنت SPM
          patched = content.replace('IPHONEOS_DEPLOYMENT_TARGET = 13.0;', 'IPHONEOS_DEPLOYMENT_TARGET = 15.0; CODE_SIGNING_ALLOWED = NO; CODE_SIGNING_REQUIRED = NO; DEVELOPMENT_TEAM = \"\";')
          with open('ios/Runner.xcodeproj/project.pbxproj', 'w') as f:
              f.write(patched)
          "
      - name: Flutter build iOS (Unsigned)
        script: flutter build ios --release --no-codesign --xcarguments="CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO DEVELOPMENT_TEAM=''"
      - name: Package Unsigned IPA
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r Sawa_Test.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa