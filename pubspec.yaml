name: chat_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  firebase_auth: any
  firebase_core: any
  email_validator: ^3.0.0
  flutter_spinkit: ^5.2.2
  pinput: ^6.0.2
  email_otp: ^3.1.0
  cloud_firestore: any
  flutter_screenutil: ^5.9.3
  animations: ^2.2.0
  liquid_glass_renderer: ^0.2.0-dev.4
  flutter_launcher_icons: ^0.14.4
  google_nav_bar: ^5.0.7
  image_picker: ^1.2.2
  firebase_storage: ^13.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

  fonts:
    - family: Pacifico
      fonts:
        - asset: assets/fonts/Pacifico-Regular.ttf
    - family: amiri
      fonts:
        - asset: assets/fonts/AmiriQuran-Regular.ttf
    - family: amara
      fonts:
        - asset: assets/fonts/Amarante-Regular.ttf
    - family: amaraa
      fonts:
        - asset: assets/fonts/Amarante-Regular.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  background_color: "#FFFFFF" 
  remove_alpha_ios: true