workflows:
  flutter-ios-build:
    name: Sawa iOS Build
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Flutter pub get
        script: flutter packages pub get
      - name: Patch Xcode Project (Version & Signing Bypass)
        script: |
          python3 -c "
          import re
          with open('ios/Runner.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()
          # حذف أي سطور قديمة للإصدار لتفادي التكرار
          content = re.sub(r'IPHONEOS_DEPLOYMENT_TARGET = .*?;', '', content)
          # حقن الإعدادات الجديدة بالملّي جوه كل الـ buildSettings
          patched = content.replace('buildSettings = {', 'buildSettings = {\n\t\t\t\tIPHONEOS_DEPLOYMENT_TARGET = 15.0;\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n\t\t\t\tDEVELOPMENT_TEAM = \"\";')
          with open('ios/Runner.xcodeproj/project.pbxproj', 'w') as f:
              f.write(patched)
          "
      - name: Flutter build iOS (Unsigned)
        script: flutter build ios --release --no-codesign
      - name: Package Unsigned IPA
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r Sawa_Test.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa